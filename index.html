<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Fast Digit Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}


.camera{
position:relative;
width:95%;
max-width:500px;
margin:auto;
}


video{
width:100%;
border-radius:20px;
}



#box{

position:absolute;

width:220px;
height:120px;

border:4px solid #00ff00;

top:50%;
left:50%;

transform:translate(-50%,-50%);

}



canvas{
display:none;
}


#hasil{

font-size:30px;
margin:20px;

}



button{

font-size:40px;

border-radius:50%;

width:80px;
height:80px;

}


</style>


</head>


<body>


<h2>Realtime Digit Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="box"></div>


</div>



<div id="hasil">
-
</div>



<button onclick="start()">
📷
</button>




<canvas id="scan"></canvas>




<script>


let video =
document.getElementById("video");


let canvas =
document.getElementById("scan");


let hasil =
document.getElementById("hasil");



let worker;

let aktif=false;





async function start(){


if(aktif)return;



let stream =
await navigator.mediaDevices.getUserMedia({

video:{
facingMode:"environment",
width:480,
height:360
}

});



video.srcObject=stream;



video.onloadedmetadata=async()=>{


worker =
await Tesseract.createWorker("eng");


await worker.setParameters({

tessedit_char_whitelist:"0123456789",

});


aktif=true;


loop();


}


}






async function loop(){


if(!aktif)return;



let ctx =
canvas.getContext("2d");



canvas.width=220;
canvas.height=120;



// hanya ambil area kotak

ctx.drawImage(

video,

(video.videoWidth-220)/2,

(video.videoHeight-120)/2,

220,
120,

0,
0,

220,
120

);



// cek apakah gambar ada objek

let img =
ctx.getImageData(
0,0,220,120
);



let terang=0;


for(let i=0;i<img.data.length;i+=4){

let v =
(img.data[i]+img.data[i+1]+img.data[i+2])/3;


if(v<180)
terang++;

}




// kalau kosong jangan OCR

if(terang>200){


let result =
await worker.recognize(canvas);



let angka =
result.data.text.replace(/\D/g,"");


// filter hasil

if(
angka.length>0 &&
angka.length<=6
){

hasil.innerHTML =
angka;


}else{

hasil.innerHTML="-";

}



}



setTimeout(loop,800);



}



</script>


</body>
</html>
