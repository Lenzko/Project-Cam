<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fast Realtime Number Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


h2{
    margin:15px;
}


.camera-box{

    position:relative;
    width:95%;
    max-width:600px;
    margin:auto;

    overflow:hidden;
    border-radius:20px;

}


video{

    width:100%;
    display:block;

}



canvas{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

}



#guide{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:300px;
height:300px;

border:3px solid #00ff00;

box-sizing:border-box;

}



#result{

margin-top:20px;

font-size:25px;

}



button{

margin-top:20px;

width:90px;
height:90px;

border-radius:50%;

font-size:40px;

border:none;

cursor:pointer;

}



</style>

</head>



<body>


<h2>📷 Fast Number Scanner</h2>



<div class="camera-box">


<video id="video" autoplay playsinline></video>


<canvas id="overlay"></canvas>


<div id="guide"></div>


</div>



<div id="result">
Angka : -
</div>



<button onclick="openCamera()">
📷
</button>





<script>


const video =
document.getElementById("video");


const canvas =
document.getElementById("overlay");


const ctx =
canvas.getContext("2d");


const result =
document.getElementById("result");



let worker;

let running=false;






async function openCamera(){


if(running)return;



try{


const stream =
await navigator.mediaDevices.getUserMedia({

video:{

facingMode:{
    exact:"environment"
},

width:{
    ideal:640
},

height:{
    ideal:480
}

}

});



video.srcObject=stream;



video.onloadedmetadata=async()=>{


canvas.width =
video.videoWidth;


canvas.height =
video.videoHeight;



// buat OCR sekali saja

worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789",

});



running=true;


scan();


};



}catch(err){


alert(
"Gagal membuka kamera"
);


}



}







async function scan(){


if(!running)return;



let temp =
document.createElement("canvas");



let ctx2 =
temp.getContext("2d");



// area scan 300x300

let box=300;


temp.width=box;

temp.height=box;



ctx2.drawImage(

video,

(video.videoWidth-box)/2,

(video.videoHeight-box)/2,

box,

box,

0,
0,

box,
box

);





const data =
await worker.recognize(temp);




drawBox(data.data.words);




setTimeout(
scan,
500
);


}







function drawBox(words){


ctx.clearRect(

0,
0,
canvas.width,
canvas.height

);



let angka=[];



words.forEach(w=>{


let text =
w.text.replace(/\D/g,"");



if(text.length){


let b =
w.bbox;



// posisi kembali ke kamera

let offsetX =
(video.videoWidth-300)/2;


let offsetY =
(video.videoHeight-300)/2;



let x =
b.x0+offsetX;


let y =
b.y0+offsetY;



let width =
b.x1-b.x0;


let height =
b.y1-b.y0;



ctx.strokeStyle =
"#00ff00";


ctx.lineWidth=5;


ctx.strokeRect(

x,
y,

width,
height

);



ctx.font =
"35px Arial";


ctx.fillStyle =
"#00ff00";



ctx.fillText(

text,

x,

y-10

);



angka.push(text);



}


});




result.innerHTML =

angka.length

?

"Angka : "+angka.join(",")

:

"Angka : -";



}





</script>


</body>
</html>
