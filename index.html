<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fast Digit Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>


<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}


h2{
    margin:15px;
}


.camera{

    position:relative;

    width:95%;
    max-width:500px;

    margin:auto;

    overflow:hidden;

    border-radius:20px;

}


video{

    width:100%;
    display:block;

}



#scanBox{

    position:absolute;

    width:220px;
    height:120px;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    border:4px solid #00ff00;

    box-sizing:border-box;

}



#hasil{

    font-size:35px;

    margin:20px;

}



button{

    width:80px;
    height:80px;

    border-radius:50%;

    font-size:40px;

    border:none;

}



canvas{

    display:none;

}


</style>


</head>



<body>


<h2>📷 Digit Scanner</h2>



<div class="camera">


<video id="video" autoplay playsinline></video>


<div id="scanBox"></div>


</div>



<div id="hasil">
-
</div>



<button onclick="startCamera()">
📷
</button>



<canvas id="canvas"></canvas>




<script>


const video =
document.getElementById("video");


const canvas =
document.getElementById("canvas");


const hasil =
document.getElementById("hasil");



let worker;

let aktif=false;





async function startCamera(){


if(aktif)return;



try{


let stream =
await navigator.mediaDevices.getUserMedia({

video:{

facingMode:"environment",

width:{
    ideal:480
},

height:{
    ideal:360
}

}

});



video.srcObject=stream;



video.onloadedmetadata=async()=>{



worker =
await Tesseract.createWorker("eng");



await worker.setParameters({

tessedit_char_whitelist:
"0123456789",


});



aktif=true;


scanDigit();


};



}catch(e){


alert(
"Kamera gagal dibuka"
);


}


}








async function scanDigit(){



if(!aktif)return;



let ctx =
canvas.getContext("2d");



canvas.width=220;
canvas.height=120;



// ambil area kotak

ctx.drawImage(

video,

(video.videoWidth-220)/2,

(video.videoHeight-120)/2,

220,
120,

0,
0,

220,
120

);





// preprocessing

let image =
ctx.getImageData(
0,
0,
220,
120
);



let data =
image.data;



let hitam=0;



for(
let i=0;
i<data.length;
i+=4
){


let gray =
(
data[i]+
data[i+1]+
data[i+2]
)/3;



// threshold

let value =
gray < 160 ? 0 : 255;



data[i]=value;
data[i+1]=value;
data[i+2]=value;



if(value===0)
hitam++;


}



ctx.putImageData(
image,
0,
0
);



// cek kosong

if(hitam < 50){


hasil.innerHTML="-";


setTimeout(
scanDigit,
700
);


return;

}




// resize besar

let big =
document.createElement("canvas");


big.width=660;

big.height=360;



let bctx =
big.getContext("2d");


bctx.drawImage(

canvas,

0,
0,

660,
360

);





let res =
await worker.recognize(big);





let angka =
res.data.text
.replace(/[^0-9]/g,"");



// filter hasil palsu

if(
angka.length>=1 &&
angka.length<=5
){


hasil.innerHTML =
angka;


}else{


hasil.innerHTML="-";


}





setTimeout(
scanDigit,
700
);



}



</script>


</body>
</html>
